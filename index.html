<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0b1d3a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SEFI"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>SEFI – World Cup 2026</title>
<style>
:root{--navy:#0b1d3a;--red:#c0392b;--green:#22c55e;--amber:#f59e0b;--purple:#7c3aed;--bg:#f4f4f2;--surface:#fff;--surface2:#ebebea;--text:#18180e;--text2:#6b6b67;--text3:#a0a09b;--border:rgba(0,0,0,.09);--r:12px;--rs:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#111;--surface:#1c1c1e;--surface2:#2c2c2e;--text:#f2f2f0;--text2:#aeaead;--text3:#6e6e6a;--border:rgba(255,255,255,.1);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text);}
body{max-width:480px;margin:0 auto;}

/* SCREENS */
.screen{display:none;flex-direction:column;height:100dvh;}
.screen.active{display:flex;}

/* TOP BAR */
.topbar{background:var(--navy);padding:env(safe-area-inset-top,12px) 16px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.logo{color:#fff;font-size:18px;font-weight:700;letter-spacing:3px;}
.topclock{color:rgba(255,255,255,.4);font-size:12px;}
.iconbtn{background:none;border:none;color:rgba(255,255,255,.6);font-size:20px;cursor:pointer;padding:4px;}

/* STATUS STRIP */
.strip{background:#0a1828;padding:5px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.strip-txt{color:rgba(255,255,255,.45);font-size:10px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);transition:background .3s;}
.status-dot.loading{background:var(--amber);animation:pulse 1s infinite;}
.status-dot.error{background:var(--red);}
.status-dot.ai{background:#818cf8;animation:pulse 1s infinite;}

/* SCROLL BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px;}

/* ALERTS */
#alerts{padding:0;}
.alert{padding:9px 14px;font-size:12px;line-height:1.5;margin:6px 12px 0;border-radius:var(--rs);border-left:3px solid var(--amber);background:#fff9e6;color:#633806;}
.alert.live{border-color:var(--red);background:#fcebeb;color:#a32d2d;}
.alert.delay{border-color:var(--amber);background:#fff9e6;color:#633806;}
.alert.penalty{border-color:var(--purple);background:#ede9fe;color:#4c1d95;}
.alert.ai-alert{border-color:#818cf8;background:#eef2ff;color:#3730a3;}
.alert.info{border-color:var(--green);background:#f0fdf4;color:#14532d;}
.alert:last-child{margin-bottom:6px;}

/* SECTIONS */
.section{padding:12px 14px;border-bottom:.5px solid var(--border);}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* LIVE CARD */
.livecard{background:var(--navy);border-radius:var(--r);padding:14px 16px;}
.badge-row{margin-bottom:11px;display:flex;gap:6px;flex-wrap:wrap;}
.livebadge{display:inline-flex;align-items:center;gap:5px;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:1px;}
.delaybadge{display:inline-flex;align-items:center;gap:5px;background:var(--amber);color:#412402;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;}
.penbadge{display:inline-flex;align-items:center;gap:5px;background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;}
.etbadge{display:inline-flex;align-items:center;gap:5px;background:#d97706;color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
.matchup{display:flex;align-items:center;justify-content:space-between;}
.tcol{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
.flag-lg{font-size:30px;line-height:1;}
.tname{color:rgba(255,255,255,.85);font-size:11px;text-align:center;font-weight:500;}
.scorecol{text-align:center;}
.scorenum{color:#fff;font-size:36px;font-weight:700;line-height:1;letter-spacing:-1px;}
.matchmin{color:rgba(255,255,255,.5);font-size:12px;margin-top:3px;}
.penscore{color:#c4b5fd;font-size:12px;margin-top:2px;}
.delayreason{color:rgba(255,255,255,.5);font-size:10px;margin-top:4px;text-align:center;padding:0 8px;}
.nolive{background:var(--surface2);border-radius:var(--r);padding:18px;text-align:center;color:var(--text2);font-size:13px;}
.nolive-icon{font-size:28px;margin-bottom:6px;}

/* NEXT MATCH */
.nextcard{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r);padding:13px 14px;}
.next-teams{font-size:15px;font-weight:600;margin-bottom:3px;color:var(--text);}
.next-when{font-size:12px;color:var(--text2);margin-bottom:11px;}
.countdown{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.cdu{background:var(--surface2);border-radius:var(--rs);padding:9px 4px;text-align:center;}
.cdn{font-size:20px;font-weight:700;color:var(--text);}
.cdl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-top:2px;}

/* TABS */
.tabrow{display:flex;border-bottom:.5px solid var(--border);background:var(--surface);flex-shrink:0;}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:11px;font-weight:500;color:var(--text2);border:none;background:none;border-bottom:2px solid transparent;cursor:pointer;}
.tab.active{color:#1a56db;border-bottom-color:#1a56db;}

/* VIEWS */
.tview{display:none;padding:11px 14px;}
.tview.active{display:block;}

/* MATCH ROW */
.mrow{display:flex;align-items:center;gap:7px;padding:8px 0;border-bottom:.5px solid var(--border);}
.mrow:last-child{border-bottom:none;}
.mbadge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;min-width:36px;text-align:center;}
.b-live{background:#fcebeb;color:#a32d2d;}
.b-done{background:var(--surface2);color:var(--text3);}
.b-soon{background:#eaf3de;color:#3b6d11;}
.b-delay{background:#fff9e6;color:#92400e;}
.b-pen{background:#ede9fe;color:#5b21b6;}
.b-et{background:#fff3cd;color:#856404;}
.mgrp{font-size:10px;color:var(--text3);min-width:14px;font-weight:700;}
.mteams{flex:1;font-size:12px;color:var(--text);}
.mscore{font-size:13px;font-weight:700;color:var(--text);min-width:36px;text-align:right;}
.mnote{font-size:10px;color:var(--text3);padding:1px 0 5px 54px;line-height:1.4;}
.daylbl{font-size:10px;color:var(--text3);padding:10px 0 3px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;}
.emptymsg{font-size:13px;color:var(--text2);padding:12px 0;}

/* AI PANEL */
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ai-avatar{width:32px;height:32px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ai-title{font-size:13px;font-weight:700;color:var(--text);}
.ai-sub{font-size:10px;color:var(--text3);}
.ai-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.ai-stat{background:var(--surface2);border-radius:var(--rs);padding:8px;text-align:center;}
.ai-stat-num{font-size:18px;font-weight:700;color:var(--text);}
.ai-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;}
#ai-log{max-height:340px;overflow-y:auto;}
.ai-entry{padding:9px 11px;border-radius:var(--rs);margin-bottom:6px;font-size:12px;line-height:1.5;}
.ai-entry.ok{background:#f0fdf4;border-left:3px solid var(--green);color:#14532d;}
.ai-entry.detect{background:#eef2ff;border-left:3px solid #6366f1;color:#3730a3;}
.ai-entry.fix{background:#f0fdf4;border-left:3px solid var(--green);color:#14532d;}
.ai-entry.warn{background:#fff9e6;border-left:3px solid var(--amber);color:#92400e;}
.ai-entry.thinking{background:var(--surface2);border-left:3px solid var(--border);color:var(--text3);font-style:italic;}
.ai-entry.error{background:#fcebeb;border-left:3px solid var(--red);color:#a32d2d;}
.ai-time{font-size:9px;opacity:.7;margin-bottom:2px;}
.ai-msg{font-weight:600;}
.ai-detail{font-size:11px;opacity:.85;margin-top:3px;font-weight:400;}

/* COUNTRY SCREEN */
.csel-hdr{padding:24px 16px 10px;text-align:center;}
.csel-hdr h1{font-size:20px;font-weight:700;margin-bottom:5px;color:var(--text);}
.csel-hdr p{font-size:13px;color:var(--text2);}
.srchwrap{padding:0 16px 10px;}
.srchwrap input{width:100%;padding:11px 14px;font-size:15px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);outline:none;}
.srchwrap input:focus{border-color:#3b82f6;}
.clist{padding:0 8px 32px;}
.citem{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:var(--rs);cursor:pointer;font-size:14px;color:var(--text);}
.citem:active{background:var(--surface2);}
.cflag{font-size:22px;width:30px;text-align:center;}
.ctz{font-size:11px;color:var(--text3);}

.updline{font-size:10px;color:var(--text3);text-align:center;padding:8px;}
.safe{height:env(safe-area-inset-bottom,12px);background:var(--surface);flex-shrink:0;}
.tz-strip{background:var(--surface2);padding:6px 16px;font-size:11px;color:var(--text2);text-align:center;flex-shrink:0;border-bottom:.5px solid var(--border);}
</style>
</head>

<!-- COUNTRY SCREEN -->
<div id="sc-country" class="screen active">

    <span class="logo">SEFI</span>

    </div>

    </div>
    <div class="clist" id="clist"></div>

</div>

<!-- MAIN SCREEN -->

      </div>
      <div id="ai-log"></div>
    </div>
    <div class="updline" id="updline"></div>
  </div>
  <div class="safe"></div>
</div>

/* ─── STATE ENGINE ─── */
const DUR=105*60*1000,HARD=240*60*1000;
function getState(m){
  if(m.status==="DELAYED") return "DELAYED";
  if(m.status==="PENALTY") return "PENALTY";
  if(m.status==="EXTRA_TIME") return "EXTRA_TIME";
  if(m.status==="FINISHED") return "FINISHED";
  if(m.status==="CANCELLED") return "CANCELLED";
  if(m.status==="SCHEDULED") return "SCHEDULED"; // BUG 12 FIX: was missing
  const diff=Date.now()-+new Date(m.kick);
  if(diff<0) return "SCHEDULED";
  if(m.hs!==null&&diff>DUR) return "FINISHED";
  if(diff>HARD) return "FINISHED";
  if(diff<=DUR) return "LIVE";
  return "FINISHED";
}
function liveMin(m){
  const delay=(m.delayMinutes||0)*60000;
  return Math.min(90,Math.max(0,Math.floor((Date.now()-+new Date(m.kick)-delay)/60000)));
}
// BUG 7 FIX: pass userTz so date grouping is correct for all timezones
function localDK(iso){return new Date(iso).toLocaleDateString('en-CA',{timeZone:userTz});}
function todayDK(){return new Date().toLocaleDateString('en-CA',{timeZone:userTz});}
function fmtT(iso){return new Date(iso).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",timeZone:userTz});}
function fmtD(iso){return new Date(iso).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric",timeZone:userTz});}
function nowStr(){return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:userTz});}

function countdown(ms){
  if(ms<=0) return "<span style='font-size:13px;color:var(--text2)'>Starting soon</span>";
  const s=ms/1000;
  return `<div class="cdu"><div class="cdn">${pad(s/86400)}</div><div class="cdl">Days</div></div>`+
    `<div class="cdu"><div class="cdn">${pad((s%86400)/3600)}</div><div class="cdl">Hrs</div></div>`+
    `<div class="cdu"><div class="cdn">${pad((s%3600)/60)}</div><div class="cdl">Min</div></div>`+
    `<div class="cdu"><div class="cdn">${pad(s%60)}</div><div class="cdl">Sec</div></div>`;
}

// BUG 13 FIX: use safe time string that never throws even before userTz is set
function safeNowStr(){
  try{return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:userTz});}
  catch{return new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
}
function aiLog(type,msg,detail=""){
  AI_LOG.unshift({type,msg,detail,time:safeNowStr()});
  if(AI_LOG.length>40) AI_LOG.pop();
  if(type==="fix") aiFixes++;
  if(type==="detect"||type==="warn") aiAlerts++;
  updateAIStats();
  renderAILog();
}

function updateAIStats(){
  const c=document.getElementById("ai-checks");if(c)c.textContent=aiChecks;
  const f=document.getElementById("ai-fixes");if(f)f.textContent=aiFixes;

function renderAILog(){

}

/* ─── ANOMALY DETECTION ─── */
function detectAnomalies(){
  const anomalies=[];
  const now=Date.now();
  MATCHES.forEach(m=>{
    const st=getState(m);
    const diffMin=(now-+new Date(m.kick))/60000;
    if(st==="LIVE"&&diffMin>130&&m.hs===null)
      anomalies.push({m,type:"stuck",desc:`${m.h} vs ${m.a} live ${Math.round(diffMin)}min with no score`});
    if(st==="LIVE"&&diffMin>150)
      anomalies.push({m,type:"overrun",desc:`${m.h} vs ${m.a} overrunning by ${Math.round(diffMin-105)}min`});
    if(m._ph!==undefined&&m.hs!==null&&m.hs<m._ph){
      anomalies.push({m,type:"score_drop",desc:`${m.h} score dropped ${m._ph}→${m.hs}`});
      m.hs=m._ph;
      // BUG 14 FIX: aiLog already increments aiFixes — removed duplicate aiFixes++ here
      aiLog("fix",`🔧 Score reversal fixed: ${m.h} vs ${m.a}`,"Score restored to previous value");
    }
    if(m.hs!==null){m._ph=m.hs;m._pa=m.as;}
  });
  return anomalies;
}

// BUG 3 FIX: updated comment — this is a Cloudflare Pages Function, not Netlify
async function callAI(prompt){
  const res=await fetch("/api/ai",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt})
  });
  if(!res.ok) throw new Error(`AI proxy ${res.status}`);
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  return data.reply;
}

/* ─── FUZZY TEAM NAME MATCH ─── */
// BUG 2 FIX: match home AND away together, with fuzzy fallback
function normalize(s){return(s||"").toLowerCase().replace(/[^a-z]/g,"");}
function teamMatch(local,live){
  const lh=normalize(local.h),la=normalize(local.a);
  const rh=normalize(live.home),ra=normalize(live.away);
  // Exact AND match (home+away both match)
  if((lh===rh&&la===ra)||(lh===ra&&la===rh)) return true;
  // Fuzzy: both teams start with the same 4 chars
  if(lh.length>=4&&rh.length>=4&&la.length>=4&&ra.length>=4){
    return(lh.slice(0,4)===rh.slice(0,4)&&la.slice(0,4)===ra.slice(0,4))||
          (lh.slice(0,4)===ra.slice(0,4)&&la.slice(0,4)===rh.slice(0,4));
  }
  return false;
}

/* ─── CALL SCORES VIA CLOUDFLARE FUNCTION ─── */
// BUG 1 FIX: accept ALL sources ("worldcup26.ir", "openfootball") not just "live"
async function fetchScores(){
  try{
    const res=await fetch("/api/scores");
    if(!res.ok) throw new Error(`Scores proxy ${res.status}`);
    const data=await res.json();

    // BUG 1 FIX: was: if(data.source==="live") — source is NEVER "live"
    // Now accepts any source that has a matches array
    if(data.matches && Array.isArray(data.matches) && data.matches.length>0){
      let updated=0;
      data.matches.forEach(live=>{
        // BUG 2 FIX: use AND match + fuzzy fallback instead of OR
        const local=MATCHES.find(m=>teamMatch(m,live));
        if(local){
          // Only update score if API has a real value
          if(live.homeScore!==null&&live.homeScore!==undefined) local.hs=live.homeScore;
          if(live.awayScore!==null&&live.awayScore!==undefined) local.as=live.awayScore;
          // Only override status if not manually set AND new status is valid upgrade
          // Never let API downgrade LIVE→SCHEDULED (stale API response)
          if(live.status&&!local._manualStatus){
            const curSt=getState(local);
            const neverDowngrade=curSt==="LIVE"&&live.status==="SCHEDULED";
            if(!neverDowngrade) local.status=live.status;
          }
          if(live.minute) local.apiMinute=live.minute;
          if(live.homeScorers) local.homeScorers=live.homeScorers;
          if(live.awayScorers) local.awayScorers=live.awayScorers;
          updated++;
        }
      });
      dataSource=data.source;
      setStatus("ok",`${data.source} · ${updated} matches synced · ${nowStr()}`);
      if(updated>0){
        aiLog("ok",`✅ Scores synced from ${data.source}`,`${updated}/${data.matches.length} fixtures matched and updated`);
      }
    } else if(data.error){
      throw new Error(data.error);
    }
  }catch(e){
    dataSource="local";
    setStatus("ok",`Local data · ${nowStr()}`);
    console.warn("fetchScores failed:",e.message);
  }
  render();
}

/* ─── AI MONITOR LOOP ─── */
// BUG 8 FIX: aiRunning now always released via try/finally
async function aiMonitor(){
  if(aiRunning) return;
  aiRunning=true;
  aiChecks++;
  updateAIStats();
  setStatus("ai","🧠 AI Brain scanning…");
  try{
    const anomalies=detectAnomalies();
    if(anomalies.length===0){
      const liveCount=MATCHES.filter(m=>getState(m)==="LIVE").length;
      if(aiChecks%4===0){
        aiLog("ok",`✅ All clear · ${liveCount} live match${liveCount!==1?"es":""}`,
          `${MATCHES.length} fixtures checked · ${nowStr()}`);
      }
      setStatus("ok",`🧠 AI monitoring · ${nowStr()}`);
    } else {
      for(const a of anomalies){
        aiLog("detect",`🔍 Anomaly: ${a.desc}`,"Asking AI…");
        try{
          const reply=await callAI(
            `World Cup 2026 anomaly detected:\nMatch: ${a.m.h} vs ${a.m.a} (Group ${a.m.g})\nKickoff: ${a.m.kick}\nScore: ${a.m.hs??'?'}-${a.m.as??'?'}\nIssue: ${a.desc}\n\nIn 2-3 sentences: what is happening, what should the app show, and what status should be set?`
          );
          aiLog("detect",`🧠 AI: ${a.m.h} vs ${a.m.a}`,reply);
          const lower=reply.toLowerCase();
          if(lower.includes("delay")||lower.includes("suspend")||lower.includes("weather")||lower.includes("lightning")){
            a.m.status="DELAYED";a.m._manualStatus=true;
            a.m.delayReason="⚠ AI detected: "+a.desc;
            // BUG 24 FIX: aiLog("fix",...) already increments aiFixes — no manual aiFixes++ needed
            aiLog("fix",`🔧 Status → DELAYED: ${a.m.h} vs ${a.m.a}`,"Based on AI analysis");
          } else if(lower.includes("penalt")){
            a.m.status="PENALTY";a.m._manualStatus=true;
            aiLog("fix",`🔧 Status → PENALTY: ${a.m.h} vs ${a.m.a}`,"Based on AI analysis");
          } else if(lower.includes("extra time")||lower.includes("overtime")){
            a.m.status="EXTRA_TIME";a.m._manualStatus=true;
            aiLog("fix",`🔧 Status → EXTRA TIME: ${a.m.h} vs ${a.m.a}`,"Based on AI analysis");
          }
        }catch(e){
          if(a.type==="overrun"){
            a.m.status="DELAYED";a.m._manualStatus=true;
            a.m.delayReason="⚠ Rule fix: overrunning "+Math.round((Date.now()-+new Date(a.m.kick))/60000)+"min";
            // BUG 24 FIX: aiLog("fix") already increments aiFixes
            aiLog("fix",`🔧 Rule fix: ${a.m.h} vs ${a.m.a} → DELAYED`,e.message);
          } else {
            aiLog("warn",`⚠ AI unavailable: ${a.desc}`,e.message);
          }
        }
        await new Promise(r=>setTimeout(r,1500));
      }
      setStatus("ok",`🧠 AI fixed ${anomalies.length} issue${anomalies.length!==1?"s":""}`);
    }
  } finally {
    // BUG 8 FIX: always release lock, even if uncaught error
    aiRunning=false;
    render();
  }
}

/* ─── MATCH ROW ─── */
function mrow(m,showDate){
  const st=getState(m);
  const badges={LIVE:"b-live Live",DELAYED:"b-delay ⛈ Delay",PENALTY:"b-pen ⚽ Pens",EXTRA_TIME:"b-et ET",FINISHED:"b-done FT",SCHEDULED:"b-soon Soon"};
  const bk=badges[st]||"b-done FT";
  const bc=bk.split(" ")[0],bt=bk.split(" ").slice(1).join(" ");
  let score;
  if(st==="SCHEDULED") score=fmtT(m.kick);
  else if(m.penaltyScore) score=`${m.hs}-${m.as} <span style="font-size:9px;color:#7c3aed">${m.penaltyScore}</span>`;
  // BUG 15 FIX: FINISHED with null score shows "Pending" not "–"
  else if(m.hs!==null) score=m.hs+"-"+m.as;
  else if(st==="FINISHED") score=`<span style="font-size:10px;color:var(--text3)">Pending</span>`;
  else score="–";
  const dd=showDate?`<div class="daylbl">${fmtD(m.kick)}</div>`:"";
  const note=m.note?`<div class="mnote">${m.note}</div>`:"";
  return `${dd}<div class="mrow"><span class="mbadge ${bc}">${bt}</span><span class="mgrp">${m.g}</span><span class="mteams">${fl(m.h)} ${m.h} vs ${m.a} ${fl(m.a)}</span><span class="mscore">${score}</span></div>${note}`;
}

/* ─── ALERTS ─── */
function buildAlerts(ms){
  const out=[];
  ms.filter(m=>getState(m)==="LIVE").forEach(m=>
    out.push({cls:"live",txt:`🔴 LIVE: ${fl(m.h)} ${m.h} ${m.hs??'–'}–${m.as??'–'} ${fl(m.a)} · ${liveMin(m)}'`}));
  ms.filter(m=>getState(m)==="DELAYED").forEach(m=>
    out.push({cls:"delay",txt:`⛈ DELAYED: ${m.h} vs ${m.a} — ${m.delayReason||"Match suspended"}`}));
  ms.filter(m=>getState(m)==="PENALTY").forEach(m=>
    out.push({cls:"penalty",txt:`⚽ PENALTY SHOOTOUT: ${m.h} vs ${m.a} — ${m.hs}-${m.as} after 90'`}));
  ms.filter(m=>getState(m)==="EXTRA_TIME").forEach(m=>
    out.push({cls:"delay",txt:`⏱ EXTRA TIME: ${m.h} vs ${m.a} — ${m.hs}-${m.as}`}));
  // Notable match alerts — show for 96h after kickoff (not 48h — matches from Jun 22 would expire)
  [{id:41,txt:"⚽ Messi brace vs Austria — 18 WC goals, all-time record!"},
   {id:42,txt:"⛈ France 3–0 Iraq — 131min weather delay. Mbappé ×2, Dembélé."}
  ].forEach(n=>{
    const m=ms.find(x=>x.id===n.id);
    if(m&&getState(m)==="FINISHED"&&(Date.now()-+new Date(m.kick))/3600000<96)
      out.push({cls:"info",txt:n.txt});
  });
  return out;
}

/* ─── RENDER ─── */
function render(){
  const now=Date.now();
  const ms=MATCHES.map(m=>({...m,state:getState(m)}));
  const live=ms.find(m=>["LIVE","DELAYED","PENALTY","EXTRA_TIME"].includes(m.state));
  const next=ms.find(m=>m.state==="SCHEDULED");
  const todayMs=ms.filter(m=>localDK(m.kick)===todayDK());
  const upcoming=ms.filter(m=>m.state==="SCHEDULED").slice(0,14);
  const results=ms.filter(m=>m.state==="FINISHED").slice(-16).reverse();

  // Alerts
  const alertsEl=document.getElementById("alerts");
  if(alertsEl){
    const alerts=buildAlerts(ms);
    alertsEl.innerHTML=alerts.map(a=>`<div class="alert ${a.cls}">${a.txt}</div>`).join("");
  }

  // Live card
  const liveEl=document.getElementById("sec-live");
  if(liveEl){
    const st=live?getState(live):null;
    let badge="";
    if(st==="LIVE") badge=`<div class="livebadge"><span class="dot" style="color:#fff"></span>LIVE · ${liveMin(live)}'</div>`;
    else if(st==="DELAYED") badge=`<div class="delaybadge">⛈ DELAYED</div>`;
    else if(st==="PENALTY") badge=`<div class="penbadge">⚽ PENALTY SHOOTOUT</div>`;
    else if(st==="EXTRA_TIME") badge=`<div class="etbadge">⏱ EXTRA TIME</div>`;
    liveEl.innerHTML=`<div class="sec-lbl">Live now</div>`+(live
      ?`<div class="livecard"><div class="badge-row">${badge}</div><div class="matchup">
          <div class="tcol"><div class="flag-lg">${fl(live.h)}</div><div class="tname">${live.h}</div></div>
          <div class="scorecol">
            <div class="scorenum">${live.hs!==null?live.hs:"–"}&thinsp;–&thinsp;${live.as!==null?live.as:"–"}</div>
            ${live.penaltyScore?`<div class="penscore">${live.penaltyScore}</div>`:""}
            ${st==="LIVE"?`<div class="matchmin">${liveMin(live)}'</div>`:""}
            ${st==="DELAYED"&&live.delayReason?`<div class="delayreason">${live.delayReason}</div>`:""}
          </div>
          <div class="tcol"><div class="flag-lg">${fl(live.a)}</div><div class="tname">${live.a}</div></div>
        </div></div>`
      :`<div class="nolive"><div class="nolive-icon">⏰</div>No live match right now</div>`);
  }

  // Next match
  const nxtEl=document.getElementById("sec-next");
  if(nxtEl) nxtEl.innerHTML=`<div class="sec-lbl">Next match</div>`+(next
    ?`<div class="nextcard"><div class="next-teams">${fl(next.h)} ${next.h} vs ${next.a} ${fl(next.a)}</div><div class="next-when">${fmtD(next.kick)} · ${fmtT(next.kick)} · Group ${next.g}</div><div class="countdown">${countdown(+new Date(next.kick)-now)}</div></div>`
    :`<div class="nolive" style="border-radius:var(--r);padding:14px;">🏆 Group stage complete</div>`);

  // Today
  const tdEl=document.getElementById("v-today");
  if(tdEl) tdEl.innerHTML=`<div class="sec-lbl">Today's matches</div>`
    +(todayMs.length?todayMs.map(m=>mrow(m,false)).join(""):`<div class="emptymsg">No matches today.</div>`);

  // Upcoming
  let p1="";
  const upEl=document.getElementById("v-upcoming");
  if(upEl) upEl.innerHTML=`<div class="sec-lbl">Upcoming</div>`
    +(upcoming.length?upcoming.map(m=>{const d=fmtD(m.kick);const s=d!==p1;p1=d;return mrow(m,s);}).join(""):`<div class="emptymsg">No upcoming matches.</div>`);

  // Results
  let p2="";
  const rsEl=document.getElementById("v-results");
  if(rsEl) rsEl.innerHTML=`<div class="sec-lbl">Results</div>`
    +(results.length?results.map(m=>{const d=fmtD(m.kick);const s=d!==p2;p2=d;return mrow(m,s);}).join(""):`<div class="emptymsg">No results yet.</div>`);

  const ul=document.getElementById("updline");
  // BUG 11 FIX: dataSource is "worldcup26.ir"/"openfootball"/"local" never "live"
  const srcLabel=dataSource==="local"?"🟡 Local data":`🟢 ${dataSource}`;
  if(ul) ul.textContent=`Updated · ${nowStr()} · ${srcLabel}`;
}

/* ─── CLOCK ONLY ─── */
function renderClock(){
  const tc=document.getElementById("topclock");
  if(tc) tc.textContent=new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",timeZone:userTz});
}

/* ─── COUNTDOWN TICK ─── */
function tickCountdown(){
  const nxtEl=document.getElementById("sec-next");
  if(!nxtEl) return;
  const next=MATCHES.map(m=>({...m,state:getState(m)})).find(m=>m.state==="SCHEDULED");
  if(next){const cd=nxtEl.querySelector(".countdown");if(cd)cd.innerHTML=countdown(+new Date(next.kick)-Date.now());}
}

/* ─── COUNTRY ─── */
function filterC(q){
  const list=document.getElementById("clist");
  const r=COUNTRIES.filter(c=>c.n.toLowerCase().includes(q.toLowerCase()));
  list.innerHTML=r.map(c=>`<div class="citem" onclick='selectC(${JSON.stringify(c).replace(/'/g,"&#39;")})'>
    <span class="cflag">${c.f}</span><span style="flex:1">${c.n}</span><span class="ctz">${c.tz.replace(/_/g," ")}</span></div>`).join("");
}
function selectC(c){
  userTz=c.tz;
  localStorage.setItem("sefi_c",JSON.stringify(c));
  document.getElementById("sc-country").classList.remove("active");
  document.getElementById("sc-main").classList.add("active");
  const strip=document.getElementById("tz-strip");
  if(strip) strip.textContent=`${c.f} ${c.n} · ${c.tz.replace(/_/g," ")}`;
  init();
}
function showCountry(){
  document.getElementById("sc-main").classList.remove("active");
  document.getElementById("sc-country").classList.add("active");
}
function switchTab(name){
  ["today","upcoming","results","ai"].forEach(v=>{document.getElementById("v-"+v).className="tview"+(v===name?" active":"");});
  document.querySelectorAll(".tab").forEach((t,i)=>{t.className="tab"+(["today","upcoming","results","ai"][i]===name?" active":"");});
}

/* ─── INIT ─── */
// BUG 4 FIX: guard against init() being called twice (double intervals)
let _initDone=false;
function init(){
  if(_initDone){
    // Already running — just refresh data
    fetchScores();
    render();
    return;
  }
  _initDone=true;
  aiLog("ok","🚀 SEFI started","AI Brain active · monitoring "+MATCHES.length+" fixtures");
  render();
  fetchScores();
  aiMonitor();
  setInterval(renderClock,1000);
  setInterval(tickCountdown,1000);
  setInterval(render,10000);
  setInterval(fetchScores,30000);   // live score poll every 30s
  setInterval(aiMonitor,20000);     // AI check every 20s
}

filterC("");
if("serviceWorker"in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

const saved=localStorage.getItem("sefi_c");
if(saved){
  try{
    const c=JSON.parse(saved);
    userTz=c.tz;
    document.getElementById("sc-country").classList.remove("active");
    document.getElementById("sc-main").classList.add("active");
    const strip=document.getElementById("tz-strip");
    if(strip) strip.textContent=`${c.f} ${c.n} · ${c.tz.replace(/_/g," ")}`;
    init();
  }catch(e){filterC("");}
}
</script>
